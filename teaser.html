<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valearion</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F5F2;--ink:#0E1217;--ink-soft:#333B44;--muted:#697079;
  --line:#D8DDD8;--signal:#2233ED;
  --serif:"Source Serif 4",Georgia,serif;--sans:"IBM Plex Sans",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#F7F8F5 0%,var(--paper) 100%);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;-webkit-font-smoothing:antialiased}
.brand{font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-.01em}
.brand span{color:var(--signal)}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--signal);font-weight:500;margin-top:22px}
.wrap{width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;text-align:center}
.video-embed{position:relative;width:100%;aspect-ratio:16/9;margin-top:24px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000;box-shadow:0 1px 2px rgba(14,18,23,.05),0 26px 52px -26px rgba(14,18,23,.22)}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.tag{font-size:15px;color:var(--muted);margin-top:26px;max-width:36em}
</style></head><body>
<div class="wrap">
<div class="brand">Valear<span>i</span>on</div>
<span class="eyebrow">Preview</span>
<div class="video-embed"><iframe src="https://www.youtube.com/embed/j0j3s15SGAQ" title="Valearion walkthrough" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
<p class="tag">Identity verification infrastructure for regulated platforms.</p>
</div>
</body></html>
